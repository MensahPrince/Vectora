# PyO3 extension modules don't link libpython: the `extension-module` feature
# leaves CPython symbols (`_PyXxx`) to be resolved by the host interpreter at
# import time. On macOS the linker must be told to allow that, or a plain
# `cargo build` of the cdylib fails with "symbol(s) not found". maturin sets
# this automatically; this makes bare `cargo build`/`cargo test` work too.

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]
