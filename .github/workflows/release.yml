name: Release

on:
  push:
    tags:
      - 'alpha-*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: macos / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # Apple Silicon only. GitHub is sunsetting the Intel macos-13 runners and
        # they get starved for long stretches, which used to hang/gate releases.
        # To bring back an Intel/universal build, cross-compile x86_64 here on the
        # arm64 runner rather than depending on a macos-13 runner.
        include:
          - runner: macos-14   # Apple Silicon
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Media decode/encode is AVFoundation/VideoToolbox — nothing to install.
      - name: Build cutlass-desktop (release)
        run: cargo build --release -p cutlass-desktop

      # package-macos.sh derives the arch from `uname -m`, so each runner
      # produces a native build for its own architecture.
      - name: Package .app
        run: chmod +x scripts/package-macos.sh && ./scripts/package-macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: cutlass-macos-${{ matrix.arch }}
          path: dist/Cutlass-*-macos-*.zip

  # Windows/Linux ship as UI previews: the app runs but media decode/encode
  # backends aren't implemented on these platforms yet (see packaging/README).
  build-linux:
    name: linux / x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install system development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            fontconfig libfontconfig1-dev \
            libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build cutlass-desktop (release)
        run: cargo build --release -p cutlass-desktop

      - name: Package tarball
        run: chmod +x scripts/package-linux.sh && ./scripts/package-linux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: cutlass-linux-x86_64
          path: dist/Cutlass-*-linux-*.tar.gz

  build-windows:
    name: windows / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x86_64
          - runner: windows-11-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build cutlass-desktop (release)
        run: cargo build --release -p cutlass-desktop

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Package zip + installer
        shell: pwsh
        run: ./scripts/package-windows-installer.ps1 -Arch ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: cutlass-windows-${{ matrix.arch }}
          path: |
            dist/Cutlass-*-windows-*.zip
            dist/Cutlass-*-windows-*-Setup.exe

  publish:
    name: github release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          draft: false
          # Publish as the repo's "Latest" release so the assets are front and
          # center on the releases page and homepage. Prereleases can't be marked
          # latest and are hidden from the homepage widget, which buried the
          # downloads. These are still alpha builds (see the alpha-* tag/name).
          prerelease: false
          make_latest: true
          files: artifacts/**/*
          generate_release_notes: false
