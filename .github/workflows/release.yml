name: Release

on:
  push:
    tags:
      - 'alpha-*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: macos / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon
            arch: arm64
          - runner: macos-13   # Intel
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg and dylibbundler
        run: brew install ffmpeg dylibbundler pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build cutlass-ui (release)
        run: cargo build --release -p cutlass-ui

      # package-macos.sh derives the arch from `uname -m`, so each runner
      # produces a native build for its own architecture.
      - name: Package .app
        run: chmod +x scripts/package-macos.sh && ./scripts/package-macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: cutlass-macos-${{ matrix.arch }}
          path: dist/Cutlass-*-macos-*.zip

          
  build-linux:
    name: linux / x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install FFmpeg development libraries
        run: | 
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config clang \
            libavcodec-dev libavformat-dev libavutil-dev \
            libavfilter-dev libavdevice-dev libswscale-dev libswresample-dev \
            fontconfig libfontconfig1-dev \
            libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build cutlass-ui (release)
        run: cargo build --release -p cutlass-ui

      - name: Package tarball
        run: chmod +x scripts/package-linux.sh && ./scripts/package-linux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: cutlass-linux-x86_64
          path: dist/Cutlass-*-linux-*.tar.gz
  build-windows:
    name: windows / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x86_64
          - runner: windows-11-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (bindgen)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18.1"
          directory: ${{ github.workspace }}/llvm

      # Prebuilt FFmpeg (sets FFMPEG_DIR) — replaces a ~40 min vcpkg source build.
      - name: Fetch prebuilt FFmpeg
        shell: pwsh
        run: ./scripts/fetch-ffmpeg-windows.ps1 -Arch ${{ matrix.arch }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build cutlass-ui (release)
        env:
          LIBCLANG_PATH: ${{ github.workspace }}/llvm/bin
        run: cargo build --release -p cutlass-ui

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Package zip + installer
        shell: pwsh
        run: ./scripts/package-windows-installer.ps1 -Arch ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: cutlass-windows-${{ matrix.arch }}
          path: |
            dist/Cutlass-*-windows-*.zip
            dist/Cutlass-*-windows-*-Setup.exe

  publish:
    name: github release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: true
          files: artifacts/**/*
          generate_release_notes: false
