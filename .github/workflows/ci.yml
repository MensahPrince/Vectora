name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: build / test / clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config clang \
            libavcodec-dev libavformat-dev libavutil-dev \
            libavfilter-dev libavdevice-dev libswscale-dev libswresample-dev \
            libfontconfig1-dev libasound2-dev \
            mesa-vulkan-drivers libvulkan1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

  # Compile the release binary on the platforms that break most often (and that the
  # Linux job above never exercises), so Windows/macOS-specific breakage surfaces on
  # the PR in minutes instead of ~40 min into a tagged Release. Compile-only keeps it
  # lean; packaging is still validated by the Release workflow on tag.
  build-macos:
    name: release build / macos arm64
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: brew install ffmpeg pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build cutlass-ui (release)
        run: cargo build --release -p cutlass-ui

  build-windows:
    name: release build / windows x86_64
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (bindgen)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18.1"
          directory: ${{ github.workspace }}/llvm

      - name: Fetch prebuilt FFmpeg
        shell: pwsh
        run: ./scripts/fetch-ffmpeg-windows.ps1 -Arch x86_64

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build cutlass-ui (release)
        env:
          LIBCLANG_PATH: ${{ github.workspace }}/llvm/bin
        run: cargo build --release -p cutlass-ui
